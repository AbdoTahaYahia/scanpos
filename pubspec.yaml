name: scanpos
description: "ScanPos - Supermarket Point-of-Sale & Inventory Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0

  # Auth
  google_sign_in: ^6.3.0

  # Barcode Scanning
  mobile_scanner: ^6.0.0

  # State Management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  uuid: ^4.5.1
  intl: ^0.20.2
  http: ^1.3.0

  # AI Vision
  google_generative_ai: ^0.4.6
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
